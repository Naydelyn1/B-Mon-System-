name: Deploy landing page to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bmon-frontend/package-lock.json

      - name: Install dependencies
        working-directory: bmon-frontend
        run: npm ci

      - name: Disable middleware (incompatible with static export)
        working-directory: bmon-frontend/src
        run: mv middleware.ts middleware.ts.disabled

      - name: Build static export
        working-directory: bmon-frontend
        run: npm run build
        env:
          NEXT_PUBLIC_EXPORT: 'true'
          NEXT_PUBLIC_BASE_PATH: /B-Mon-System-
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:3001/api' }}

      - name: Add .nojekyll (required for Next.js on GitHub Pages)
        run: touch bmon-frontend/out/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./bmon-frontend/out
